# RuboCop Configuration for Rails Architect

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'vendor/**/*'
    - 'spec/fixtures/**/*'
  SuggestExtensions: false

# Cop configurations
Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 30
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 200
  Exclude:
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 70
  Exclude:
    - 'spec/**/*'

Metrics/CyclomaticComplexity:
  Max: 12
  Exclude:
    - 'spec/**/*'

Metrics/PerceivedComplexity:
  Max: 12
  Exclude:
    - 'spec/**/*'

Metrics/BlockLength:
  Max: 50
  Exclude:
    - 'spec/**/*'

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: true

